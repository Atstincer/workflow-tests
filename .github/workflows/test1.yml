name: Testing stuff

on:
  push:
    branches:
      - main

jobs:
  a_test_job:
    runs-on: ubuntu-latest
    env:
      COMMITS: ${{ toJson(github.event.commits) }}
      COMMIT_MESSAGES: ${{ toJson(github.event.commits.*.message) }}
    steps:
      - uses: actions/checkout@v6
      - name: getting the job to fail
        run: exit 1
      - name: github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: commits general
        run: echo "$COMMITS"
      - name: head commit
        run: echo "Head commit ${{github.head_commit}}"
      - name: first commit id
        run: echo "Commit id ${{github.event.commits[0].id}}"
      - name: first commit message
        run: echo "Commit message ${{github.event.commits[0].message}}"
      - name: commit messages
        run: echo "$COMMIT_MESSAGES"
      - name: evaluating commit messages
        if: ${{contains(join(env.COMMIT_MESSAGES),'try')}}
        run: echo "COMMIT_MESSAGES contains try"
      - name: getting job status
        run: echo "Job status ${{job.status}}"
      - name: Notify discord if deployment success
        if: ${{ success() }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          notimestamp: true
          color: #90EE90
          content: ":white_check_mark: **Deployment Successfull!** A new version deployed to production"
          title: "Deployment details"
          url: https://github.com/Atstincer/workflow-tests
          description: |
            **Commit:** ${{ github.event.commits[0].id }}
            **Message:** ${{ github.event.commits[0].message }}
            **Author:** ${{ github.event.commits[0].author.name }}
      - name: Notify discord if deployment fails
        if: ${{ failure() }}
        uses: sarisia/actions-status-discord@58180bef04cb443276032345179c5372bde1b03c
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          notimestamp: true
          color: #ff0000
          content: ":x: **Build failed!** The pipeline encountered an error"
          title: "Failure details"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.event.head_commit.id }}
            **Message:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
            **Workflow:** ${{ github.workflow }}
            **Job:** ${{ github.job }}

            [View Commit](${{ github.event.head_commit.url }})
